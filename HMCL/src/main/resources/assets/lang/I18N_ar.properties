game.crash.reason.modmixin_failure=تعطّلت اللعبة لأن بعض المودات فشلت في الحقن.\n\
   \n\
   يعني هذا عموماً أن المود يحتوي على خطأ أو غير متوافق مع البيئة الحالية.\n\
   \n\
   يمكنك مراجعة السجل للعثور على المود المسبب للخطأ.
game.crash.reason.mod_repeat_installation=تعطّلت اللعبة بسبب مودات مكررة.\n\
   \n\
   يمكن تثبيت كل مود مرة واحدة فقط. يُرجى حذف المود المكرر ثم إعادة تشغيل اللعبة.
game.crash.reason.forge_error=قد يكون Forge/NeoForge قد أعطى معلومات عن الخطأ.\n\
   \n\
   يمكنك مراجعة السجل ومعالجة المشكلة وفقاً لمعلومات السجل في تقرير الخطأ.\n\
   \n\
   إذا لم تجد رسالة الخطأ، يمكنك مراجعة تقرير الخطأ لفهم كيفية حدوثه.\n\
   %1$s
game.crash.reason.mod_resolution0=تعطّلت اللعبة بسبب بعض مشاكل المودات. يمكنك مراجعة السجلات للعثور على المود/المودات المعطوبة.
game.crash.reason.mixin_apply_mod_failed=تعطّلت اللعبة لأن mixin لم يتمكن من التطبيق على المود "%1$s".\n\
   \n\
   يمكنك محاولة حذف أو تحديث المود لحل المشكلة.
game.crash.reason.java_version_is_too_high=تعطّلت اللعبة لأن إصدار Java حديث جداً للاستمرار في التشغيل.\n\
   \n\
   يُرجى استخدام الإصدار الرئيسي السابق من Java في "الإعدادات العامة/الخاصة بالنسخة ← Java" ثم تشغيل اللعبة.\n\
   \n\
   إذا لم يكن لديك واحد، يمكنك تنزيله من <a href="https://www.java.com/download/">java.com (Java 8)</a> أو <a href="https://bell-sw.com/pages/downloads/#downloads">BellSoft Liberica Full JRE (Java 17)</a> وتوزيعات أخرى (أعد تشغيل المشغّل بعد التثبيت).
game.crash.reason.need_jdk11=تعطّلت اللعبة بسبب إصدار Java غير مناسب.\n\
   \n\
   تحتاج إلى تنزيل وتثبيت Java 11، وضبطه في "الإعدادات العامة/الخاصة بالنسخة ← Java".
game.crash.reason.mod_name=تعطّلت اللعبة بسبب مشاكل في أسماء ملفات المودات.\n\
   \n\
   يجب أن تستخدم أسماء ملفات المودات الحروف الإنجليزية فقط (A~Z، a~z) والأرقام (0~9) والشرطات (-) والشرطات السفلية (_) والنقاط (.) بالأحجام النصفية.\n\
   \n\
   يُرجى الانتقال إلى مجلد المودات وتغيير جميع أسماء ملفات المودات غير المتوافقة باستخدام الأحرف المتوافقة أعلاه.
game.crash.reason.incomplete_forge_installation=لا تستطيع اللعبة الاستمرار بسبب تثبيت Forge/NeoForge غير مكتمل.\n\
   \n\
   يُرجى إعادة تثبيت Forge/NeoForge في "تعديل النسخة ← محمّلات المودات".
game.crash.reason.fabric_version_0_12=Fabric Loader 0.12 أو أحدث غير متوافق مع المودات المثبتة حالياً. تحتاج إلى تخفيض إصداره إلى 0.11.7.
game.crash.reason.fabric_warnings=أعطى Fabric Loader التحذير التالي:\n\
   \n\
   %1$s
game.crash.reason.file_already_exists=تعطّلت اللعبة لأن الملف "%1$s" موجود مسبقاً.\n\
   \n\
   يمكنك محاولة نسخ احتياطي لذلك الملف وحذفه، ثم إعادة تشغيل اللعبة.
game.crash.reason.file_changed=تعطّلت اللعبة لأن التحقق من الملف فشل.\n\
   \n\
   إذا قمت بتعديل ملف Minecraft.jar، ستحتاج إلى التراجع عن التعديل أو إعادة تنزيل اللعبة.
game.crash.reason.gl_operation_failure=تعطّلت اللعبة بسبب بعض المودات أو الظلال أو حزم الموارد/القوام.\n\
   \n\
   يُرجى تعطيل المودات أو الظلال أو حزم الموارد/القوام التي تستخدمها ثم إعادة المحاولة.
game.crash.reason.graphics_driver=تعطّلت اللعبة بسبب مشكلة في تعريف بطاقة الرسومات الخاصة بك.\n\
   \n\
   يُرجى إعادة المحاولة بعد تحديث تعريف بطاقة الرسومات إلى أحدث إصدار.\n\
   \n\
   إذا كان جهازك يحتوي على بطاقة رسومات مخصصة، تحتاج إلى التحقق مما إذا كانت اللعبة تستخدم الرسومات المدمجة/الأساسية. إذا كان الأمر كذلك، يُرجى فتح المشغّل باستخدام بطاقة الرسومات المخصصة. إذا استمرت المشكلة، ربما ينبغي لك التفكير في استخدام بطاقة رسومات جديدة أو حاسوب جديد.\n\
   \n\
   إذا كنت تستخدم بطاقة الرسومات المدمجة، لاحظ أن Minecraft 1.16.5 أو أقدم يتطلب <a href="https://www.oracle.com/java/technologies/javase/javase8-archive-downloads.html">Java 1.8.0_51 أو أقدم</a> لسلسلة معالجات Intel(R) Core(TM) 3000 أو أقدم.
game.crash.reason.macos_failed_to_find_service_port_for_display=لا تستطيع اللعبة الاستمرار لأن نافذة OpenGL على منصة Apple silicon فشلت في التهيئة.\n\
   \n\
   لهذه المشكلة، لا يملك HMCL حلولاً مباشرة في الوقت الحالي. يُرجى محاولة فتح أي متصفح والدخول إلى وضع ملء الشاشة، ثم العودة إلى HMCL وتشغيل اللعبة، و<b>العودة بسرعة إلى صفحة المتصفح</b> قبل ظهور نافذة اللعبة، وانتظر حتى تظهر نافذة اللعبة، ثم التبديل إلى نافذة اللعبة.
game.crash.reason.illegal_access_error=تعطّلت اللعبة بسبب بعض المودات.\n\
   \n\
   إذا كنت تعرف هذا: "%1$s"، يمكنك تحديث أو حذف المود/المودات ثم إعادة المحاولة.
game.crash.reason.install_mixinbootstrap=تعطّلت اللعبة بسبب غياب MixinBootstrap.\n\
   \n\
   يمكنك محاولة تثبيت <a href="https://www.curseforge.com/minecraft/mc-mods/mixinbootstrap">MixinBootstrap</a> لحل المشكلة. إذا تعطّل بعد التثبيت، جرّب إضافة علامة تعجب (!) أمام اسم ملف هذا المود لمحاولة حل المشكلة.
game.crash.reason.optifine_is_not_compatible_with_forge=تعطّلت اللعبة لأن OptiFine غير متوافق مع تثبيت Forge الحالي.\n\
   \n\
   يُرجى الانتقال إلى <a href="https://optifine.net/downloads">الموقع الرسمي لـ OptiFine</a>، والتحقق من توافق إصدار Forge مع OptiFine، وإعادة تثبيت النسخة بدقة وفقاً للإصدار المقابل، أو تغيير إصدار OptiFine في "تعديل النسخة ← محمّلات المودات".\n\
   \n\
   بعد الاختبار، نعتقد أن إصدارات OptiFine المرتفعة أو المنخفضة جداً قد تسبب تعطلاً.
game.crash.reason.mod_files_are_decompressed=تعطّلت اللعبة لأن ملف المود تم فك ضغطه.\n\
   \n\
   يُرجى وضع ملف المود كاملاً مباشرةً في مجلد المودات!\n\
   \n\
   إذا تسبّب فك الضغط في أخطاء في اللعبة، يُرجى حذف المود المفكوك الضغط في مجلد المودات ثم تشغيل اللعبة.
game.crash.reason.shaders_mod=تعطّلت اللعبة بسبب تثبيت كل من OptiFine ومود الظلال في نفس الوقت.\n\
   \n\
   فقط أزل مود الظلال لأن OptiFine يحتوي على دعم مدمج للظلال.
game.crash.reason.rtss_forest_sodium=تعطّلت اللعبة لأن RivaTuner Statistical Server (RTSS) غير متوافق مع Sodium.\n\
   \n\
   انقر <a href="https://github.com/CaffeineMC/sodium-fabric/wiki/Known-Issues#rtss-incompatible">هنا</a> للمزيد من التفاصيل.
game.crash.reason.too_many_mods_lead_to_exceeding_the_id_limit=تعطّلت اللعبة لأنك ثبّتت عدداً كبيراً جداً من المودات وتجاوزت حد معرّفات اللعبة.\n\
   \n\
   يُرجى محاولة تثبيت <a href="https://www.curseforge.com/minecraft/mc-mods/jeid">JEID</a> أو حذف بعض المودات الكبيرة.
game.crash.reason.night_config_fixes=تعطّلت اللعبة بسبب بعض مشاكل Night Config.\n\
   \n\
   يمكنك محاولة تثبيت مود <a href="https://www.curseforge.com/minecraft/mc-mods/night-config-fixes">Night Config Fixes</a>، الذي قد يساعدك في حل هذه المشكلة.\n\
   \n\
   لمزيد من المعلومات، زر <a href="https://github.com/Fuzss/nightconfigfixes">مستودع GitHub</a> لهذا المود.
game.crash.reason.optifine_causes_the_world_to_fail_to_load=قد لا تتمكن اللعبة من الاستمرار بسبب OptiFine.\n\
   \n\
   تحدث هذه المشكلة في إصدار معين من OptiFine فقط. يمكنك محاولة تغيير إصدار OptiFine في "تعديل النسخة ← محمّلات المودات".
game.crash.reason.jdk_9=تعطّلت اللعبة لأن إصدار Java حديث جداً لهذه النسخة.\n\
   \n\
   تحتاج إلى تنزيل وتثبيت Java 8 واختياره في "الإعدادات العامة/الخاصة بالنسخة ← Java".
game.crash.reason.jvm_32bit=تعطّلت اللعبة لأن تخصيص الذاكرة الحالي تجاوز حد JVM 32-bit.\n\
   \n\
   إذا كان نظام التشغيل 64-bit، يُرجى تثبيت واستخدام إصدار Java 64-bit. وإلا، قد تحتاج إلى إعادة تثبيت نظام تشغيل 64-bit أو الحصول على حاسوب أحدث.\n\
   \n\
   أو، يمكنك تعطيل خيار "التخصيص التلقائي" في "الإعدادات العامة/الخاصة بالنسخة ← الذاكرة" وضبط الحجم الأقصى لتخصيص الذاكرة على 1024 ميجابايت أو أقل.
game.crash.reason.loading_crashed_forge=تعطّلت اللعبة بسبب المود "%1$s" (%2$s).\n\
   \n\
   يمكنك محاولة حذفه أو تحديثه.
game.crash.reason.loading_crashed_fabric=تعطّلت اللعبة بسبب المود "%1$s".\n\
   \n\
   يمكنك محاولة حذفه أو تحديثه.
game.crash.reason.mac_jdk_8u261=تعطّلت اللعبة لأن إصدار Forge أو OptiFine الحالي غير متوافق مع تثبيت Java الخاص بك.\n\
   \n\
   يُرجى محاولة تحديث Forge وOptiFine، أو محاولة استخدام Java 8u251 أو الإصدارات السابقة.
game.crash.reason.forge_repeat_installation=تعطّلت اللعبة بسبب تثبيت Forge مكرر. <a href="https://github.com/HMCL-dev/HMCL/issues/1880">هذه مشكلة معروفة</a>\n\
   \n\
   يُنصح بإرسال تقرير على GitHub مع هذا السجل حتى نتمكن من إيجاد مزيد من الأدلة وحل المشكلة.\n\
   \n\
   حالياً يمكنك إلغاء تثبيت Forge وإعادة تثبيته في "تعديل النسخة ← محمّلات المودات".
game.crash.reason.optifine_repeat_installation=تعطّلت اللعبة بسبب تثبيت OptiFine مكرر.\n\
   \n\
   يُرجى حذف OptiFine من مجلد المودات أو إلغاء تثبيته في "تعديل النسخة ← محمّلات المودات".
game.crash.reason.memory_exceeded=تعطّلت اللعبة لأن الذاكرة المخصصة كانت كبيرة جداً لملف الصفحة الصغير.\n\
   \n\
   يمكنك محاولة تعطيل خيار "التخصيص التلقائي" في "الإعدادات العامة/الخاصة بالنسخة ← الذاكرة" وضبط القيمة حتى تعمل اللعبة.\n\
   \n\
   يمكنك أيضاً محاولة زيادة حجم ملف الصفحة في إعدادات النظام.
game.crash.reason.mod=تعطّلت اللعبة بسبب المود "%1$s".\n\
   \n\
   يمكنك تحديث أو حذف المود ثم إعادة المحاولة.
game.crash.reason.mod_resolution=لا تستطيع اللعبة الاستمرار بسبب مشاكل في تبعيات المودات.\n\
   \n\
   أعطى Fabric التفاصيل التالية:\n\
   \n\
   %1$s
game.crash.reason.forgemod_resolution=لا تستطيع اللعبة الاستمرار بسبب مشاكل في تبعيات المودات.\n\
   \n\
   أعطى Forge/NeoForge التفاصيل التالية:\n\
   %1$s
game.crash.reason.forge_found_duplicate_mods=تعطّلت اللعبة بسبب مشكلة مودات مكررة. أعطى Forge/NeoForge المعلومات التالية:\n\
   %1$s
game.crash.reason.mod_resolution_collection=تعطّلت اللعبة لأن إصدار المود غير متوافق.\n\
   \n\
   يتطلب "%1$s" المود "%2$s".\n\
   \n\
   تحتاج إلى ترقية أو تخفيض إصدار "%3$s" قبل المتابعة.
game.crash.reason.mod_resolution_conflict=تعطّلت اللعبة بسبب مودات متعارضة.\n\
   \n\
   "%1$s" غير متوافق مع "%2$s".
game.crash.reason.mod_resolution_missing=تعطّلت اللعبة لأن بعض المودات التابعة لم يتم تثبيتها.\n\
   \n\
   يتطلب "%1$s" المود "%2$s".\n\
   \n\
   هذا يعني أنك تحتاج إلى تنزيل وتثبيت "%2$s" أولاً للمتابعة.
game.crash.reason.mod_resolution_missing_minecraft=تعطّلت اللعبة لأن مود غير متوافق مع إصدار Minecraft الحالي.\n\
   \n\
   يتطلب "%1$s" إصدار Minecraft %2$s.\n\
   \n\
   إذا أردت اللعب بهذا الإصدار من المود مثبتاً، يجب تغيير إصدار اللعبة في نسختك.\n\
   \n\
   وإلا، يجب تثبيت إصدار متوافق مع إصدار Minecraft هذا.
game.crash.reason.mod_resolution_mod_version=%1$s (الإصدار: %2$s)
game.crash.reason.mod_resolution_mod_version.any=%1$s (أي إصدار)
game.crash.reason.modlauncher_8=تعطّلت اللعبة لأن إصدار Forge الحالي غير متوافق مع تثبيت Java الخاص بك. يُرجى محاولة تحديث Forge.
game.crash.reason.no_class_def_found_error=لا تستطيع اللعبة الاستمرار بسبب كود غير مكتمل.\n\
   \n\
   نسختك من اللعبة تفتقد "%1$s". قد يكون ذلك بسبب غياب مود، أو تثبيت مود غير متوافق، أو تلف بعض الملفات.\n\
   \n\
   قد تحتاج إلى إعادة تثبيت اللعبة وجميع المودات أو طلب المساعدة.
game.crash.reason.no_such_method_error=لا تستطيع اللعبة الاستمرار بسبب كود غير مكتمل.\n\
   \n\
   قد تفتقد نسختك من اللعبة مود معين، أو تحتوي على مود غير متوافق، أو قد تكون بعض الملفات تالفة.\n\
   \n\
   قد تحتاج إلى إعادة تثبيت اللعبة وجميع المودات أو طلب المساعدة.
game.crash.reason.opengl_not_supported=تعطّلت اللعبة لأن تعريف بطاقة الرسومات لا يدعم OpenGL.\n\
   \n\
   إذا كنت تبث اللعبة عبر الإنترنت أو تستخدم بيئة سطح مكتب بعيد، يُرجى اللعب على جهازك المحلي.\n\
   \n\
   أو، يمكنك تحديث تعريف بطاقة الرسومات إلى أحدث إصدار ثم إعادة المحاولة.\n\
   \n\
   إذا كان جهازك يحتوي على بطاقة رسومات مخصصة، يُرجى التأكد من أن اللعبة تستخدمها فعلاً للرسم. إذا استمرت المشكلة، يُرجى التفكير في الحصول على بطاقة رسومات جديدة أو حاسوب جديد.
game.crash.reason.openj9=اللعبة غير قادرة على العمل على JVM من نوع OpenJ9. يُرجى التبديل إلى Java يستخدم Hotspot JVM في "الإعدادات العامة/الخاصة بالنسخة ← Java" وإعادة تشغيل اللعبة. إذا لم يكن لديك واحد، يمكنك تنزيله.
game.crash.reason.out_of_memory=تعطّلت اللعبة لأن الحاسوب نفد منه الذاكرة.\n\
   \n\
   ربما لا توجد ذاكرة كافية متاحة أو تم تثبيت عدد كبير جداً من المودات. يمكنك محاولة حل المشكلة بزيادة الذاكرة المخصصة في "الإعدادات العامة/الخاصة بالنسخة ← الذاكرة".\n\
   \n\
   إذا استمررت في مواجهة هذه المشاكل، قد تحتاج إلى حاسوب أفضل.
game.crash.reason.resolution_too_high=تعطّلت اللعبة لأن دقة حزمة الموارد/القوام عالية جداً.\n\
   \n\
   يجب التبديل إلى حزمة موارد/قوام بدقة أقل أو التفكير في شراء بطاقة رسومات أفضل بذاكرة VRAM أكبر.
game.crash.reason.stacktrace=سبب التعطل غير معروف. يمكنك مراجعة تفاصيله بالنقر على "السجلات".\n\
   \n\
   هناك بعض الكلمات المفتاحية التي قد تحتوي على أسماء مودات. يمكنك البحث عنها عبر الإنترنت لتحديد المشكلة بنفسك.\n\
   \n\
   %s
game.crash.reason.too_old_java=تعطّلت اللعبة لأنك تستخدم إصداراً قديماً من Java.\n\
   \n\
   تحتاج إلى التبديل إلى إصدار Java أحدث (%1$s) في "الإعدادات العامة/الخاصة بالنسخة ← Java" ثم إعادة تشغيل اللعبة. يمكنك تنزيل Java من <a href="https://learn.microsoft.com/java/openjdk/download">هنا</a>.
game.crash.reason.unknown=لم نتمكن من تحديد سبب تعطل اللعبة. يُرجى الرجوع إلى سجلات اللعبة.
game.crash.reason.unsatisfied_link_error=فشل تشغيل Minecraft بسبب مكتبات مفقودة: %1$s.\n\
   \n\
   إذا قمت بتعديل مسار المكتبة الأصلية، يُرجى التأكد من وجود هذه المكتبات. أو، يُرجى محاولة التشغيل مجدداً بعد إعادتها إلى الوضع الافتراضي.\n\
   \n\
   إذا لم تفعل ذلك، يُرجى التحقق مما إذا كانت لديك مودات تابعة مفقودة.\n\
   \n\
   وإلا، إذا اعتقدت أن HMCL هو السبب، يُرجى إرسال تقرير عن المشكلة إلينا.
