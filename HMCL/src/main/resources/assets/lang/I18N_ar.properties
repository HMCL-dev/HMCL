terracotta.confirm.desc=Terracotta هو برنامج مفتوح المصدر ومجاني من طرف ثالث. يُرجى إرسال تقارير عن أي مشاكل تواجهها عبر القنوات المخصصة أثناء الاستخدام.\n\
  يستخدم Terracotta تقنية P2P. بعد الاتصال الناجح، يتصل المستخدمون في الغرفة مباشرةً ببعضهم دون أي خادم وسيط لنقل البيانات. تعتمد تجربة اللعب الجماعي بشكل كبير على جودة الشبكة لدى المشاركين.\n\
  طوال عملية اللعب الجماعي، يجب الالتزام الصارم بجميع قوانين وأنظمة بلدك ومنطقتك.
