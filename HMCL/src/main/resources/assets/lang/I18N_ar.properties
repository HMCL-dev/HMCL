fatal.config_loading_failure=لا يمكن تحميل ملفات الإعدادات.\n\
   يُرجى التأكد من أن Hello Minecraft! Launcher يملك صلاحيات القراءة والكتابة على "%s" والملفات الموجودة فيه.\n\
   لمستخدمي macOS، جرّب وضع HMCL في موقع بصلاحيات غير "سطح المكتب" و"التنزيلات" و"المستندات" وأعد المحاولة.
fatal.config_loading_failure.unix=لا يستطيع Hello Minecraft! Launcher تحميل ملف الإعدادات لأنه أُنشئ بواسطة المستخدم "%1$s".\n\
   يُرجى فتح HMCL كمستخدم جذر (غير موصى به)، أو تنفيذ الأمر التالي في الطرفية لتغيير ملكية ملف الإعدادات إلى المستخدم الحالي:\n%2$s
fatal.config_unsupported_version=ملف الإعدادات الحالي أُنشئ بواسطة إصدار أحدث من Hello Minecraft! Launcher، ولا يستطيع هذا الإصدار من HMCL تحميله بشكل صحيح.\n\
   يُرجى تحديث HMCL وإعادة تشغيله.\n\
   قبل تحديث المشغّل، لن يتم حفظ أي إعدادات تقوم بتعديلها.
fatal.mac_app_translocation=تم عزل Hello Minecraft! Launcher في مجلد مؤقت بواسطة نظام التشغيل بسبب آليات أمان macOS.\n\
   يُرجى نقل HMCL إلى مجلد آخر قبل محاولة الفتح. وإلا، قد تُفقد إعداداتك وبيانات اللعبة بعد إعادة التشغيل.\n\
   هل تريد المتابعة؟
fatal.migration_requires_manual_reboot=تم ترقية Hello Minecraft! Launcher. يُرجى إعادة تشغيل المشغّل.
fatal.apply_update_failure=نأسف، لكن Hello Minecraft! Launcher غير قادر على التحديث التلقائي.\n\
