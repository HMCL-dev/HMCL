exception.access_denied=لا يستطيع HMCL الوصول إلى الملف "%s". قد يكون مقفلاً بواسطة عملية أخرى.\n\
   \n\
   لمستخدمي Windows، يمكنك فتح "مراقب الموارد" للتحقق مما إذا كانت عملية أخرى تستخدمه حالياً. إذا كان الأمر كذلك، يمكنك المحاولة مجدداً بعد إنهاء تلك العملية.\n\
   إذا لم يكن كذلك، يُرجى التحقق من أن حساب المستخدم الخاص بك يملك الصلاحيات الكافية للوصول إليه.
